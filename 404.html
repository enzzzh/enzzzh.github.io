<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
    <script src="https://unpkg.com/ionicons@4.2.4/dist/ionicons.js"></script>
    <link rel="shortcut icon" type="image/png" href="resources/favicon.png"/>
    <title>Welcome to My Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            color: #ffffff;
            text-align: center;
            font-family: 'Roboto', sans-serif;
            background: #1a1a1a; 
            overflow-y: auto; 
        }

        ::-webkit-scrollbar {
            width: 8px; 
        }

        ::-webkit-scrollbar-track {
            background: rgba(50, 50, 50, 0.9); 
            border-radius: 10px; 
        }

        ::-webkit-scrollbar-thumb {
            background: #525252; 
            border-radius: 10px; 
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #777; 
        }

        .outer {
            padding: 20px;
            text-align: center;
            overflow-x: hidden;
        }

        .inner {
            display: inline-block;
            padding: 40px;
            background: rgba(50, 50, 50, 0.9);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            margin: 20px auto;
            transform: translateY(20px); 
            animation: fadeIn 1s ease-in-out both;
            min-height: 400px; 
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        p {
            font-size: 1em;
            margin: 10px 0 30px;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 100px; 
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.05); 
        }

        .avatar {
            width: 150px; 
            height: 150px; 
        }

        .button {
            display: inline-flex;
            align-items: center;
            padding: 0.8rem 1.5rem;
            margin-top: 2rem;
            background: #585858; 
            color: #ffffff; 
            border: 1px solid #444; 
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .button:hover {
            background: #505050; 
            color: rgb(0, 0, 0) a1a; 
           transform: translateY(-6px);
        }


    </style>
</head>
<body>
    <div class="outer">
        <div class="inner loadanimation">
            <img src="resources/avatar.jpeg" class="avatar" alt="Avatar">
            <h1 class="padDown">404</h1> <br>
            <p>The page is still under developpement </p>
            <p>Please go back to the main page to continue browsing </p>
            </ul>
            <a href="index.html" class="button">
              ← Return to Home
          </a>
        </div>
    </div>
</body>
</html>
