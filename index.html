<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
    <script src="https://unpkg.com/ionicons@4.2.4/dist/ionicons.js"></script>
    <link rel="shortcut icon" type="image/png" href="resources/favicon.png"/>
    <title>Welcome to My Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            color: #ffffff;
            text-align: center;
            font-family: 'Roboto', sans-serif;
            background: #1a1a1a; 
            overflow-y: auto; 
        }

        ::-webkit-scrollbar {
            width: 8px; 
        }

        ::-webkit-scrollbar-track {
            background: rgba(50, 50, 50, 0.9); 
            border-radius: 10px; 
        }

        ::-webkit-scrollbar-thumb {
            background: #525252; 
            border-radius: 10px; 
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #777; 
        }

        .outer {
            padding: 20px;
            text-align: center;
            overflow-x: hidden;
        }

        .inner {
            display: inline-block;
            padding: 40px;
            background: rgba(50, 50, 50, 0.9);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            margin: 20px auto;
            transform: translateY(20px); 
            animation: fadeIn 1s ease-in-out both;
            min-height: 400px; 
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        p {
            font-size: 1em;
            margin: 10px 0 30px;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 100px; 
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.05); 
        }

        .avatar {
            width: 150px; 
            height: 150px; 
        }

        .social {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .social li {
            display: inline-block;
            margin: 0.5em;
            transition: transform 0.15s ease;
        }

        .social li:hover {
            transform: scale(1.125);
            color: #2dd4bf; 
        }

        .social li a {
            display: block;
            color: #acacac;
            padding: 1em;
            width: 6em;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .social li a:hover {
            background: #494949;
            color: #ffffff; 
        }

        Icon colors .icon-resume, .icon-email, .icon-github, .icon-linkedin, .icon-transcript { 
            color: #acacac; 
        }


        .skill {
            display: inline-block;
            font-size: 1.5em;
            transition: linear 0.5s ;
        }
        
    </style>
</head>
<body>
    <div class="outer">
        <div class="inner loadanimation">
            <img src="resources/avatar.jpeg" class="avatar" alt="Avatar">
            <h1 class="padDown">Welcome</h1>
            <p>I can code <span id="spin" class="skill"></span></p>

            <ul class="social">
                <li class="icon-resume tile"><a href="cv.html"><ion-icon name="document"></ion-icon><br>Resume</a></li>
                <li class="icon-transcript tile"><a href="404.html"><ion-icon name="school"></ion-icon><br>Transcript</a></li>
                <li class="icon-github tile"><a href="https://github.com/enzzzh"><ion-icon name="logo-github"></ion-icon><br>GitHub</a></li>
                <li class="icon-linkedin tile"><a href="https://www.linkedin.com/in/enzo-hakim-885293290/"><ion-icon name="logo-linkedin"></ion-icon><br>LinkedIn</a></li>
                <li class="icon-email tile"><a href="mailto:enzohakim2008@gmail.com"><ion-icon name="mail"></ion-icon><br>Email</a></li>
            </ul>
        </div>
    </div>
    <script>
        const skills = ["C++", "Java", "Python","JavaScript", "Bash"];
        let index = 0;
        const spinElement = document.getElementById('spin');

        function updateSkill() {
            spinElement.style.opacity = 1; 
            setTimeout(() => {
                spinElement.textContent = skills[index];
                spinElement.style.opacity = 1; 
                index = (index + 1) % skills.length; 
            }, 500); 
        }

        setInterval(updateSkill, 250); 
        updateSkill(); 
    </script>
</body>
</html>
