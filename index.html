<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
    <script src="https://unpkg.com/ionicons@4.2.4/dist/ionicons.js"></script>
    <link rel="shortcut icon" type="image/png" href="resources/favicon.png"/>
    <title>Welcome to My Home</title>
    <style>
     
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            color: #ffffff;
            text-align: center;
            font-family: 'Roboto', sans-serif;
            background: #272727;
            overflow-y: auto; 
        }

        
        ::-webkit-scrollbar {
            width: 8px; 
        }

        ::-webkit-scrollbar-track {
            background: rgba(50, 50, 50, 0.9); 
            border-radius: 10px; 
        }

        ::-webkit-scrollbar-thumb {
            background: #979693; 
            border-radius: 10px; 
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5e5e5e; 
        }

        .outer {
            padding: 20px;
            text-align: center;
            overflow-x: hidden;
        }

        .inner {
            display: inline-block;
            padding: 40px;
            background: rgba(50, 50, 50, 0.9);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            margin: 20px auto;
            transform: translateY(20px); 
            animation: fadeInRight 1s ease-in-out both;
            min-height: 400px; 
        }

        h1 {
            font-size: 2.25em;
            padding: 0 1em;
            font-style: italic;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.25em;
            margin: 10px 0 30px;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 100px; 
            box-shadow: 0 0 0px 3px #fff, 0 0 0 4px #ccc, 0 4px 6px #333;
        }

        .avatar {
            width: 150px; 
            height: 150px; 
        }

        .social {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .social li {
            display: inline-block;
            margin: 0.5em;
            transition: transform 0.15s ease;
        }

        .social li:hover {
            transform: scale(1.25);
            color: #272727;
        }

        .social li a {
            display: block;
            color: #acacac;
            padding: 1em;
            width: 6em;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .social li a:hover {
            background: #5e5e5e;
        }

        /* Icon colors */
        .icon-resume { color: #acacac; }
        .icon-email { color: #acacac; }
        .icon-github { color: #acacac; }
        .icon-linkedin { color: #acacac; }
        .icon-transcript { color: #acacac; }

        
        .loadanimation {
            animation: fadeInRight 1s ease-in-out both;
        }

        @keyframes fadeInRight {
            0% {
                opacity: 0;
                transform: translateX(300px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        #spin {
            color: #ffffff;
        }

        #spin:after {
            content: "";
            animation: spin 2.5s linear infinite;
        }

        @keyframes spin {
            0% { content: "Go"; }
            10% { content: "C++"; }
            20% { content: "Java"; }
            30% { content: "Python"; }
            40% { content: "Node"; }
            50% { content: "JavaScript"; }
            60% { content: "PHP"; }
            70% { content: "Assembly"; }
            80% { content: "React"; }
            90% { content: "C#"; }
            100% { content: "Bash"; }
        }
    </style>
</head>
<body>
    <div class="outer">
        <div class="inner loadanimation">
            <img src="resources/avatar.jpeg" class="avatar" alt="Avatar">
            <h1 class="padDown">Welcome</h1>
            <p>I can code <span id="spin"></span></p>

            <ul class="social">
                <li class="icon-resume tile"><a href="cv.html"><ion-icon name="document"></ion-icon><br>Resume</a></li>
                <li class="icon-transcript tile"><a href="404.html"><ion-icon name="school"></ion-icon><br>Transcript</a></li>
                <li class ="icon-github tile"><a href="https://github.com/enzzzh"><ion-icon name="logo-github"></ion-icon><br>GitHub</a></li>
                <li class="icon-linkedin tile"><a href="https://www.linkedin.com/in/enzo-hakim-885293290/"><ion-icon name="logo-linkedin"></ion-icon><br>LinkedIn</a></li>
                <li class="icon-email tile"><a href="mailto:enzohakim2008@gmail.com"><ion-icon name="mail"></ion-icon><br>Email</a></li>
            </ul>
        </div>
    </div>
</body>
</html>
